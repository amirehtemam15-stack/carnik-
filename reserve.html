<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>رزرو آنلاین</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">رزرو آنلاین</header>

<div class="section">
    <form class="card" action="https://formsubmit.co/your@email.com" method="POST">

        <label>نام و نام خانوادگی</label>
        <input type="text" name="name" required>

        <label>شماره تماس</label>
        <input type="text" name="phone" required>

        <label>نوع خدمت</label>
        <select name="service">
            <option>روشویی</option>
            <option>توشویی</option>
            <option>صفرشویی</option>
            <option>پولیش</option>
        </select>

        <label>توضیحات</label>
        <textarea name="msg"></textarea>

        <button type="submit">ثبت رزرو</button>
    </form>
</div>

</body>
</html>
